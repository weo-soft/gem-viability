name: Bug report
description: Something is wrong in the gem viewer or build
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: What did you expect, and what did you see instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Steps, browser/OS if relevant, and whether you used the live site or a local build.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, console errors, or links are helpful.
